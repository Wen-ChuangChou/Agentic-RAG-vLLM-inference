# ==========================================================================
# Agentic RAG Configuration
# ==========================================================================
# Switch between backends by changing the "backend" field.
# To use vLLM: set backend: "vllm" and ensure the server is running.
# To use Blablador: set backend: "blablador" (requires Blablador_API_KEY in .env).

# Backend selection: "blablador" or "vllm"
backend: "vllm"

# === vLLM backend config ===
vllm:
  # Set this to http://<hpc-node-hostname>:8000/v1 after launching the server.
  # When client and server run on the same node, use localhost.
  api_base: "http://localhost:8000/v1"
  api_key: "ai4all"               # Must match --api-key in launch script
  model_id: "zai-org/GLM-4.7-Flash"                # Must match --served-model-name in launch script
  temperature: 0.2
  max_tokens: 16384

# === Blablador backend config (existing behavior) ===
blablador:
  api_base: "https://api.helmholtz-blablador.fz-juelich.de/v1"
  # api_key is loaded from .env (Blablador_API_KEY)
  model_name: "Qwen3.5-122B"               # Short name, resolved via BlabladorChatModel
  temperature: 0.2
  max_tokens: 16384

# === Evaluation judge model ===
# The LLM-as-judge can use a different backend/model than the answer model.
evaluation:
  backend: "blablador"                      # "blablador" or "vllm"
  # --- Blablador eval settings ---
  model_name: "GPT-OSS-120b"
  # --- vLLM eval settings (if backend is "vllm") ---
  # model_id: "zai-org/GLM-5"
  # api_base: "http://localhost:8000/v1"
  # api_key: "ai4all"
  temperature: 0.0
  max_tokens: 16384

# === Vector DB config ===
vectordb:
  batch_size: 50
  max_workers: 4
  doc_chunk_size: 100
  text_chunk_size: 200
  text_chunk_overlap: 40
  force_rebuild: false
  use_parallel: true
